name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install root dependencies
        run: npm install --legacy-peer-deps

      - name: Build Web Frontend
        run: npm run build


      - name: Install mobile dependencies
        run: |
          cd mobile
          npm install --legacy-peer-deps

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build Android Release APK
        run: |
          cd mobile
          npx expo prebuild -p android
          mkdir -p android/app/src/main/assets/www
          cp -r ../dist/* android/app/src/main/assets/www/
          cd android
          echo "org.gradle.jvmargs=-Xmx3g" >> gradle.properties
          chmod +x ./gradlew
          ./gradlew assembleRelease --stacktrace

      - name: Create Password Protected ZIP
        run: |
          sudo apt-get install -y zip
          cd mobile/android/app/build/outputs/apk/release/
          zip -P agrigrowth -r ../../../../../../../AgriGrowth_Resilient.zip app-release.apk
          mv ../../../../../../../AgriGrowth_Resilient.zip $GITHUB_WORKSPACE/

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-zip
          path: AgriGrowth_Resilient.zip
