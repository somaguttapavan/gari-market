name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ── Build web frontend ────────────────────────────────────────────────
      - name: Install root dependencies
        run: npm install --legacy-peer-deps

      - name: Build Web Frontend
        run: npm run build

      # ── Build mobile APK ──────────────────────────────────────────────────
      - name: Install mobile dependencies
        working-directory: mobile
        run: npm install --legacy-peer-deps

      - name: Expo Prebuild (generate Android project)
        working-directory: mobile
        run: npx expo prebuild -p android --no-install

      - name: Copy web assets into Android assets folder
        run: |
          mkdir -p mobile/android/app/src/main/assets/www
          cp -r dist/* mobile/android/app/src/main/assets/www/

      - name: Increase Gradle JVM memory
        run: echo "org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=512m" >> mobile/android/gradle.properties

      - name: Build Android DEBUG APK (no keystore needed)
        working-directory: mobile/android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --stacktrace --no-daemon

      # ── Package & upload ──────────────────────────────────────────────────
      - name: Rename APK
        run: |
          mkdir -p output
          cp mobile/android/app/build/outputs/apk/debug/app-debug.apk output/AgriGrowth.apk

      - name: Create Password Protected ZIP
        run: |
          sudo apt-get install -y zip
          cd output
          zip -P agrigrowth AgriGrowth_Resilient.zip AgriGrowth.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: AgriGrowth-APK
          path: output/AgriGrowth_Resilient.zip
          retention-days: 30
